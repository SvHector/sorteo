<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Selecciona tu número</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Selecciona tu número</h1>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">

<div class="modal-content">

<h2>Reservar número</h2>

<p id="numeroSeleccionado" class="numero-modal"></p>

<input id="nombre" placeholder="Tu nombre">

<div class="modal-buttons">
<button class="btn-primary" onclick="reservar()">Reservar</button>
<button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
</div>

</div>

</div>


<script type="module">

import { db } from "./firebase-config.js";
import { ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

let datos=[];
let numeroActual=null;

const grid=document.getElementById("grid");

const dbRef = ref(db,"rifa");

onValue(dbRef,(snapshot)=>{

const data = snapshot.val();

datos=[];

data.forEach((item,index)=>{

datos.push({
firebaseId:index,
...item
});

});

renderizar();

});



function renderizar(){

grid.innerHTML="";

datos.forEach(n=>{

let estado="libre";

if(n.nombre) estado="ocupado";
if(n.pagado) estado="pagado";

const card=document.createElement("div");

card.className="numero "+estado;

card.innerHTML=`
<div class="numero-id">${n.numero}</div>
<div class="numero-status">${estado.toUpperCase()}</div>
`;

if(!n.nombre){
card.onclick=()=>abrirModal(n);
}

grid.appendChild(card);

});

}


function abrirModal(n){

numeroActual=n;

document.getElementById("modal").style.display="flex";
document.getElementById("numeroSeleccionado").innerText=n.numero;

}


window.cerrarModal=function(){

document.getElementById("modal").style.display="none";

}


window.reservar=function(){

const nombre=document.getElementById("nombre").value;

if(!nombre){
alert("Escribe tu nombre");
return;
}

update(ref(db,"rifa/"+numeroActual.firebaseId),{
nombre:nombre,
pagado:false
});

cerrarModal();

const mensaje = `Hola, reservé el número ${numeroActual.numero} para la rifa`;

window.open(
`https://wa.me/522291325534?text=${encodeURIComponent(mensaje)}`,
"_blank"
);

}

</script>

</body>
</html>
