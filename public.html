<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Selecciona tu número</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Selecciona tu número</h1>

<div id="grid" class="grid"></div>


<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<h2>Reservar número</h2>

<p id="numeroSeleccionado" class="numero-modal"></p>

<input id="nombre" placeholder="Tu nombre">

<div class="modal-buttons">
<button class="btn-primary" onclick="reservar()">Reservar</button>
<button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
</div>

</div>

</div>


<script type="module">

import { db } from "./firebase-config.js";
import { ref,onValue,update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

let datos=[];
let numeroActual=null;

const grid=document.getElementById("grid");

onValue(ref(db,"rifa"),(snapshot)=>{

const data=snapshot.val();
datos=[];

for(let key in data){
datos.push({
firebaseId:key,
...data[key]
});
}

renderizar();

});


function renderizar(){

grid.innerHTML="";

datos.forEach(n=>{

let estado="libre";

if(n.nombre) estado="ocupado";
if(n.pagado) estado="pagado";

const card=document.createElement("div");

card.className="numero "+estado;

card.innerHTML=`
<div class="numero-id">${n.numero}</div>
<div class="numero-status">${estado.toUpperCase()}</div>
`;

if(!n.nombre){
card.onclick=()=>abrirModal(n);
}

grid.appendChild(card);

});

}


function abrirModal(n){

numeroActual=n;

document.getElementById("modal").style.display="flex";
document.getElementById("numeroSeleccionado").innerText=n.numero;

}


window.cerrarModal=function(){

document.getElementById("modal").style.display="none";

}


window.reservar=function(){

const nombre=document.getElementById("nombre").value;

if(!nombre){

alert("Escribe tu nombre");
return;

}

update(ref(db,"rifa/"+numeroActual.firebaseId),{

nombre:nombre,
pagado:false

});

cerrarModal();

}

</script>

</body>
</html>
